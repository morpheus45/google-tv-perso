name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # permet de déclencher manuellement depuis GitHub

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. JDK 17 ─────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Cache Gradle ────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── 4. Permissions Gradle wrapper ──────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 5. Générer le debug keystore (requis pour signer l'APK) ───
      - name: Generate debug keystore
        run: |
          mkdir -p $HOME/.android
          keytool -genkeypair -v \
            -keystore $HOME/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      # ── 6. Build Release APK ───────────────────────────────────────
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      # ── 7. Renommer l'APK ─────────────────────────────────────────
      - name: Rename APK
        run: |
          mkdir -p output
          cp app/build/outputs/apk/release/app-release.apk output/GoogleTVPerso.apk
          ls -lh output/

      # ── 8. Upload artifact (toujours disponible) ───────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoogleTVPerso-APK
          path: output/GoogleTVPerso.apk
          retention-days: 90

      # ── 9. Créer une Release GitHub avec l'APK en téléchargement ──
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Google TV Perso v1.0.${{ github.run_number }}"
          body: |
            ## Google TV Perso — APK prêt à installer

            ### Installation sur ta TV Android
            1. Télécharge `GoogleTVPerso.apk` ci-dessous
            2. Copie sur une clé USB ou envoie via ADB :
               ```
               adb connect <IP_TV>:5555
               adb install GoogleTVPerso.apk
               ```
            3. Appuie sur **HOME** → choisis **Google TV Perso** → **Toujours**
            4. L'app se lancera automatiquement à chaque démarrage de la TV

            ### Ce que contient cette version
            - Interface Google TV fidèle (sidebar, hero, rangées de contenu)
            - VOD + Séries depuis goldenlink.live
            - TV en Direct
            - Navigation D-pad complète
            - Lecteur VLC embarqué
            - Launcher HOME : remplace Google TV au démarrage
          files: output/GoogleTVPerso.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
